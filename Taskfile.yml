version: "3"

tasks:
  "build":
    deps:
      - "build:cli"
      - "build:compiler"
      - "build:mcp"
      - "build:packages"
      - "build:vscode-extension"
      - "build:chrome-extension"

  install:
    cmds:
      - sudo cp ./compiler/bin/2webc /usr/local/bin/2webc
      - sudo cp ./cli/bin/2web /usr/local/bin/2web
      - sudo cp ./tools/mcp/bin/2web-mcp /usr/local/bin/2web-mcp

  "build:cli":
    dir: "./cli"
    cmds:
      - go build -ldflags "-s -w" -o ./bin/2web ./src/main.go

  "build:compiler":
    dir: "./compiler"
    cmds:
      - go build -ldflags "-s -w" -o ./bin/2webc ./src/main.go

  "build:mcp":
    dir: "./tools/mcp"
    cmds:
      - go build -ldflags "-s -w" -o ./bin/2web-mcp ./src/main.go

  "build:packages":
    dir: "./packages"
    cmds:
      - pnpm build

  "build:vscode-extension":
    dir: "./tools/vscode-extension"
    cmds:
      - pnpm build

  "build:chrome-extension":
    dir: "./tools/chrome-extension"
    cmds:
      - pnpm build
