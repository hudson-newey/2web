<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@two-web/signals</title>
    <link rel="stylesheet" href="dev-styles.css" />
  </head>

  <body>
    <script type="module">
      import {
        eventHandler,
        textContent,
        query,
        eventListener,
        onFirstUpdate,
      } from "../signals/index.ts";

      const target = query("#counter-button");
      const clickHandler = eventHandler(0, (_, value) => value + 1);

      clickHandler.subscribe((value) => {
        console.log("Button clicked, new count:", value);
      });

      eventListener("click", target, clickHandler);
      textContent(target, clickHandler);
    </script>

    <button id="counter-button">0</button>

    <style>
      #counter-button {
        font-size: 2rem;
        padding: 1rem 2rem;
        cursor: pointer;
      }
    </style>
  </body>
</html>
